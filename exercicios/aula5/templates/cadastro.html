{% extends "layout.html" %}

{% block conteudo %}
    <h2>Cadastro</h2>
    <p>Faça o cadastro com nome, senha e bio.</p>
    <form>
        <input type="text" id="nome" placeholder="Nome">
        <br>
        <input type="text" id="senha" placeholder="Senha">
        <br>
        <input type="text" id="bio" placeholder="Bio">
        <br>
        <button type="button" onclick="enviarUsuario()">Salvar</button>
    </form>

    <script>
        async function enviarUsuario() {
            const dados = {
                nome: document.getElementById('nome').value,
                senha: document.getElementById('senha').value,
                bio: document.getElementById('bio').value
            };

            const resposta = await fetch('/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dados)
            });

            if (resposta.ok) {
                const resultado = await resposta.json();
                alert("Usuário " + resultado.usuario + " criado!");
            } else {
                alert("Erro ao enviar!");
            }
        }
    </script>
{% endblock %}
