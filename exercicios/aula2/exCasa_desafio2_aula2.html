<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Desafio 2</title>
        <style>
            .centre{
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="centre">
            <h1>2</h1>
            <button onclick="dobre()">Dobrar</button>
        </div>
        
        <script>
            let valor=2;
            function dobre(){
                valor=valor*2;
                document.querySelector('h1').innerHTML=valor;
                
                if(valor>100){
                    alert(`Cuidado, o número ${valor} está ficando muito grande!`);
                }
            }

        </script>
    
    </body>
</html>
