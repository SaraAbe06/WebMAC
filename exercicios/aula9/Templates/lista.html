<div>
    <input type="text" 
           name="busca" 
           placeholder="Buscar..."
           hx-get="/lista"
           hx-trigger="input changed delay:500ms"
           hx-target="#lista"
           hx-select="#lista"
           hx-indicator="#indicator">

    <span id="indicator" class="htmx-indicator">Carregando...</span>
</div>

<div id="lista">
    <ul>
        {% for aluno in alunos %}
            <li>{{ aluno.id }} {{ aluno.nome }}</li>
        {% else %}
            <li>Não há alunos</li>
        {% endfor %}
    </ul>

    <div>
        <button hx-get="/lista?page={{page-1}}&flag_proxima={{flag_proxima}}"
                hx-target="main"
                {% if page <= 1 %} disabled="disabled" {% endif %}>
            Anterior 
        </button>

        <button hx-get="/lista?page={{page+1}}&flag_proxima={{flag_proxima}}"
                hx-target="main"
                {% if not flag_proxima %} disabled="disabled" {% endif %}>
            Proximo
        </button>
    </div>
</div>
