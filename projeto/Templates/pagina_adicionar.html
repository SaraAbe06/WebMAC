<div class="container1">
    <h2>Adicionar Novos Livros</h2>
    <br>
    <p>Para adicionar o livro digite o nome e autor do livro e sua nota. Lembre-se que a nota é de 0 a 5 com intervalos de 0.5!</p>
    <br>
    <form  hx-post="/AdicionarLivro"
           hx-target="#mensagem-add-livro"
           hx-swap="innerHTML">
    <input type="text" name="nome" placeholder="Nome do Livro" required>
    <br>
    <input type="text" name="nome_autor" placeholder="Nome do Autor" required>
    <br>
    <input type="number" name="nota" min=0 max=5 step=0.5 placeholder="Nota" required>
    <br>

    <button type="submit">Adicionar</button>
    </form>
    <br>
    <div id="mensagem-add-livro"></div>

</div>
